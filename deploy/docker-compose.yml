services:
  db:
    image: postgres:16-alpine
    container_name: nexuskit-db-local
    restart: always
    environment:
      POSTGRES_USER: nexus_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: nexuskit_auth
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck: # 确保数据库完全启动后，再启动 API 服务
      test: ["CMD-SHELL", "pg_isready -U nexus_admin -d nexuskit_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexuskit-redis-local
    restart: always
    command: redis-server --save 60 1 --loglevel warning # 开启基础持久化
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  nexus-net:
    name: nexuskit-network